<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MechFinder — Find Mechanics</title>
  <link rel="stylesheet" href="/static/css/main.css"/>
  <style>
    body{overflow:hidden}
    .layout{display:flex;height:100vh;padding-top:var(--nav-h)}
    .sidebar{width:380px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
    .sb-top{padding:20px 20px 12px;border-bottom:1px solid var(--border)}
    .sb-title{font-family:var(--fd);font-size:20px;margin-bottom:12px}
    .search-bar{display:flex;gap:8px}
    .sinp{flex:1;padding:10px 14px;background:var(--bg3);border:1.5px solid var(--border2);border-radius:var(--r);font-family:var(--fb);font-size:13px;color:var(--text);outline:none;transition:all .2s}
    .sinp:focus{border-color:var(--accent);background:var(--bg)}
    .sinp::placeholder{color:var(--text3)}
    .chips{display:flex;gap:6px;flex-wrap:wrap;padding:12px 20px;border-bottom:1px solid var(--border)}
    .chip{padding:5px 12px;border-radius:100px;background:var(--surface);border:1px solid var(--border);font-size:12px;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
    .chip:hover{border-color:var(--border2);color:var(--text)}
    .chip.on{background:var(--accent-soft);border-color:rgba(255,107,43,.3);color:var(--accent2);font-weight:600}
    .card-list{flex:1;overflow-y:auto;padding:12px}
    .mcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:10px;cursor:pointer;transition:all .2s}
    .mcard:hover,.mcard.active{border-color:rgba(255,107,43,.3);background:var(--surface2)}
    .mcard-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
    .mcard-ava{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .mcard-name{font-size:14px;font-weight:700;color:var(--text)}
    .mcard-type{font-size:12px;color:var(--text2)}
    .avail-badge{margin-left:auto;font-size:11px;font-weight:600;padding:3px 9px;border-radius:100px}
    .avail-open{background:var(--ok-soft);color:var(--ok)}
    .avail-busy{background:var(--warn-soft);color:var(--warn)}
    .avail-closed{background:var(--surface3);color:var(--text3)}
    .mcard-row{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);margin-bottom:6px}
    .mcard-row svg{width:12px;height:12px;color:var(--text3);flex-shrink:0}
    .stars{color:var(--warn);font-size:12px}
    .mcard-divider{height:1px;background:var(--border);margin:10px 0}
    .mcard-actions{display:flex;gap:8px}
    .btn-call{flex:1;padding:8px;border-radius:10px;background:var(--accent-soft);color:var(--accent2);border:1px solid rgba(255,107,43,.2);font-family:var(--fb);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s}
    .btn-call:hover{background:rgba(255,107,43,.2)}
    .btn-call svg,.btn-dir svg{width:13px;height:13px}
    .btn-dir{flex:1;padding:8px;border-radius:10px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);font-family:var(--fb);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s}
    .btn-dir:hover{background:var(--surface3);color:var(--text)}
    /* Map area */
    .map-area{flex:1;background:var(--bg3);position:relative;overflow:hidden}
    .map-grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,107,43,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,107,43,.03) 1px,transparent 1px);background-size:40px 40px}
    .road-h{position:absolute;background:rgba(255,255,255,.04);height:2px;left:0;right:0}
    .road-v{position:absolute;background:rgba(255,255,255,.04);width:2px;top:0;bottom:0}
    .you-marker{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;z-index:10}
    .you-dot{width:16px;height:16px;background:var(--accent);border-radius:50%;border:3px solid var(--bg);box-shadow:0 0 20px var(--accent-glow)}
    .you-ring{position:absolute;top:50%;left:50%;width:16px;height:16px;border:2px solid var(--accent);border-radius:50%;animation:mripple 2.5s ease-out infinite}
    .you-ring2{animation-delay:.9s}
    @keyframes mripple{0%{transform:translate(-50%,-50%) scale(1);opacity:.8}100%{transform:translate(-50%,-50%) scale(4.5);opacity:0}}
    .you-tag{font-size:10px;font-weight:700;color:#fff;background:var(--accent);padding:2px 8px;border-radius:100px;margin-top:7px;white-space:nowrap}
    .m-pin{position:absolute;display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:transform .2s;z-index:9}
    .m-pin:hover{transform:scale(1.2)}
    .m-pin-dot{width:12px;height:12px;border-radius:50%;border:2.5px solid var(--bg)}
    .m-pin-lbl{font-size:9px;color:var(--text2);margin-top:3px;white-space:nowrap}
    /* Detail panel */
    .detail-overlay{position:absolute;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border2);padding:20px 24px;animation:slideUp .25s ease;max-height:65%;overflow-y:auto}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .detail-close{position:absolute;top:16px;right:16px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:18px;transition:all .2s}
    .detail-close:hover{background:var(--surface3);color:var(--text)}
    .det-top{display:flex;align-items:center;gap:16px;margin-bottom:16px}
    .det-ava{width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
    .det-name{font-family:var(--fd);font-size:20px;color:var(--text);margin-bottom:3px}
    .det-type{font-size:13px;color:var(--text2)}
    .det-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
    .dstat{background:var(--bg3);border-radius:var(--r);padding:12px;text-align:center}
    .dstat-v{font-family:var(--fd);font-size:20px;color:var(--text);display:block}
    .dstat-l{font-size:11px;color:var(--text2);display:block;margin-top:2px}
    .det-row{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text2);margin-bottom:10px}
    .det-row svg{width:14px;height:14px;color:var(--text3);flex-shrink:0}
    .svc-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
    .svc-tag{padding:4px 10px;border-radius:100px;background:var(--surface2);border:1px solid var(--border);font-size:11px;color:var(--text2)}
    .det-actions{display:flex;gap:10px;margin-top:16px}
    @media(max-width:760px){.sidebar{width:100%;height:50vh}.layout{flex-direction:column}.map-area{min-height:50vh}}
  </style>
</head>
<body>
<nav class="navbar">
  <a href="/" class="nav-logo"><div class="logo-mark">⚙</div><span class="logo-name">MechFinder</span></a>
  <ul class="nav-links">
    <li><a href="/">Home</a></li>
    <li><a href="/dashboard">Dashboard</a></li>
    <li><a href="/map" class="active">Find Mechanics</a></li>
    <li><a href="/services">Services</a></li>
    <li><a href="/login">Login</a></li>
  </ul>
</nav>
<div class="layout">
  <div class="sidebar">
    <div class="sb-top">
      <div class="sb-title">Find Mechanics</div>
      <div class="search-bar">
        <input class="sinp" id="searchInput" placeholder="Search by name or service…" oninput="filterCards()"/>
        <button class="btn btn-primary btn-sm" onclick="filterCards()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
      </div>
    </div>
    <div class="chips">
      <span class="chip on" onclick="setChip(this,'all')">All</span>
      <span class="chip" onclick="setChip(this,'open')">Open Now</span>
      <span class="chip" onclick="setChip(this,'top')">Top Rated ★</span>
      <span class="chip" onclick="setChip(this,'brakes')">Brakes</span>
      <span class="chip" onclick="setChip(this,'tyre')">Tyres</span>
      <span class="chip" onclick="setChip(this,'engine')">Engine</span>
    </div>
    <div class="card-list" id="cardList"></div>
  </div>
  <div class="map-area" id="mapArea">
    <div class="map-grid-bg"></div>
    <div class="road-h" style="top:30%"></div><div class="road-h" style="top:55%"></div><div class="road-h" style="top:75%"></div>
    <div class="road-v" style="left:25%"></div><div class="road-v" style="left:50%"></div><div class="road-v" style="left:72%"></div>
    <div class="you-marker"><div class="you-dot"></div><div class="you-ring"></div><div class="you-ring you-ring2"></div><div class="you-tag">📍 You</div></div>
    <div id="pins"></div>
    <div id="detailPanel" style="display:none"></div>
  </div>
</div>
<script>
const mechanics=[
  {id:1,name:"Carlos Auto Works",type:"General Mechanic",avatar:"🔧",color:"rgba(59,130,246,.15)",pinColor:"#3b82f6",phone:"+1(555)201-4432",availability:"open",availLabel:"Open Now",address:"45 Park St, Downtown",distance:"0.8 km",distKm:0.8,rating:4.8,reviews:142,hours:"Mon–Sat 8am–7pm",wait:"~15 min",services:["Oil Change","Brakes","Engine","Suspension","Diagnostics"],pinX:"18%",pinY:"22%"},
  {id:2,name:"QuickFix Garage",type:"Express Service",avatar:"⚡",color:"rgba(139,92,246,.15)",pinColor:"#8b5cf6",phone:"+1(555)308-9910",availability:"open",availLabel:"Open Now",address:"12 East Rd, Midtown",distance:"1.2 km",distKm:1.2,rating:4.5,reviews:89,hours:"Mon–Sun 7am–9pm",wait:"~5 min",services:["Tyres","Battery","A/C Repair","Exhaust","Alignment"],pinX:"68%",pinY:"62%"},
  {id:3,name:"Green Lane Motors",type:"Full Service Workshop",avatar:"🛠️",color:"rgba(52,211,153,.1)",pinColor:"#16a34a",phone:"+1(555)412-7760",availability:"busy",availLabel:"Busy",address:"88 West Ave, Westside",distance:"2.1 km",distKm:2.1,rating:4.9,reviews:231,hours:"Mon–Fri 9am–6pm",wait:"~45 min",services:["Engine Overhaul","Transmission","Electrical","Welding","Painting"],pinX:"34%",pinY:"40%"},
  {id:4,name:"Speedy Wrench",type:"Mobile Mechanic",avatar:"🚐",color:"rgba(251,191,36,.1)",pinColor:"#d97706",phone:"+1(555)519-3348",availability:"open",availLabel:"Open Now",address:"Comes to you! · East Zone",distance:"2.6 km",distKm:2.6,rating:4.3,reviews:67,hours:"Daily 6am–10pm",wait:"~20 min",services:["Roadside Assist","Battery Jump","Tyre Change","Minor Repairs"],pinX:"76%",pinY:"30%"},
  {id:5,name:"City Star Mechanics",type:"Certified Workshop",avatar:"⭐",color:"rgba(236,72,153,.1)",pinColor:"#ec4899",phone:"+1(555)624-5511",availability:"open",availLabel:"Open Now",address:"33 Harbour Rd, Southside",distance:"3.0 km",distKm:3.0,rating:4.7,reviews:188,hours:"Mon–Sat 8am–8pm",wait:"~10 min",services:["Full Service","A/C Repair","Brakes","Diagnostics","Insurance Claims"],pinX:"55%",pinY:"75%"},
  {id:6,name:"Harbour Auto Hub",type:"Multi-brand Service",avatar:"🏎️",color:"rgba(14,165,233,.1)",pinColor:"#0ea5e9",phone:"+1(555)730-8820",availability:"closed",availLabel:"Closed",address:"99 West Ave, Harbour",distance:"4.4 km",distKm:4.4,rating:4.1,reviews:54,hours:"Mon–Fri 9am–5pm",wait:"Opens 9am",services:["European Cars","Luxury","Tyres","Electrical","Detailing"],pinX:"20%",pinY:"68%"}
];
let selId=null,activeChip='all';
function starsHtml(r){let h='';for(let i=1;i<=5;i++)h+=`<span style="color:${r>=i?'var(--warn)':r>=i-.5?'var(--warn)':'var(--surface3)'}">${r>=i||r>=i-.5?'★':'☆'}</span>`;return h;}
function renderCards(list){
  document.getElementById('cardList').innerHTML=list.length?list.map(m=>`
    <div class="mcard${selId===m.id?' active':''}" onclick="selectM(${m.id})">
      <div class="mcard-top">
        <div class="mcard-ava" style="background:${m.color}">${m.avatar}</div>
        <div><div class="mcard-name">${m.name}</div><div class="mcard-type">${m.type}</div></div>
        <span class="avail-badge avail-${m.availability}">${m.availLabel}</span>
      </div>
      <div class="mcard-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${m.distance} · ${m.address}</div>
      <div class="mcard-row"><span class="stars">${starsHtml(m.rating)}</span> ${m.rating} (${m.reviews}) · Wait: ${m.wait}</div>
      <div class="mcard-divider"></div>
      <div class="mcard-actions">
        <button class="btn-call" onclick="event.stopPropagation();alert('Calling ${m.phone}…')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.44 2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.94a16 16 0 0 0 6.14 6.14l.95-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.9 16.9z"/></svg>Call</button>
        <button class="btn-dir" onclick="event.stopPropagation();alert('Getting directions to ${m.name}…')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>Directions</button>
      </div>
    </div>`).join(''):'<div style="padding:24px;text-align:center;color:var(--text3);font-size:14px">No mechanics match your search.</div>';
}
function renderPins(){
  document.getElementById('pins').innerHTML=mechanics.map(m=>`
    <div class="m-pin" style="left:${m.pinX};top:${m.pinY}" onclick="selectM(${m.id})">
      <div class="m-pin-dot" style="background:${selId===m.id?'var(--accent)':m.pinColor}"></div>
      <div class="m-pin-lbl">${m.name.split(' ')[0]}</div>
    </div>`).join('');
}
function renderDetail(m){
  const dp=document.getElementById('detailPanel');
  dp.style.display='block';
  dp.innerHTML=`<div class="detail-overlay">
    <div class="detail-close" onclick="closeDetail()">×</div>
    <div class="det-top">
      <div class="det-ava" style="background:${m.color}">${m.avatar}</div>
      <div><div class="det-name">${m.name}</div><div class="det-type">${m.type}</div><span class="avail-badge avail-${m.availability}" style="display:inline-block;margin-top:5px">${m.availLabel}</span></div>
    </div>
    <div class="det-stats">
      <div class="dstat"><span class="dstat-v">${m.rating}</span><span class="dstat-l">Rating</span></div>
      <div class="dstat"><span class="dstat-v">${m.reviews}</span><span class="dstat-l">Reviews</span></div>
      <div class="dstat"><span class="dstat-v">${m.distance}</span><span class="dstat-l">Distance</span></div>
    </div>
    <div class="det-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.44 2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.94a16 16 0 0 0 6.14 6.14l.95-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.9 16.9z"/></svg> <strong>${m.phone}</strong></div>
    <div class="det-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg> ${m.address}</div>
    <div class="det-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> ${m.hours} · Wait: <strong>${m.wait}</strong></div>
    <div style="font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin:14px 0 8px">Services</div>
    <div class="svc-tags">${m.services.map(s=>`<span class="svc-tag">${s}</span>`).join('')}</div>
    <div class="det-actions">
      <button class="btn btn-primary" style="flex:1" onclick="alert('Calling ${m.phone}…')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.44 2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.94a16 16 0 0 0 6.14 6.14l.95-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.9 16.9z"/></svg>Call Now</button>
      <button class="btn btn-ghost" style="flex:1" onclick="alert('Directions to ${m.name}…')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>Directions</button>
    </div>
  </div>`;
}
function closeDetail(){document.getElementById('detailPanel').style.display='none';selId=null;renderPins();renderCards(getFiltered());}
function selectM(id){selId=id;const m=mechanics.find(x=>x.id===id);renderPins();renderDetail(m);renderCards(getFiltered());}
function setChip(el,val){document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));el.classList.add('on');activeChip=val;renderCards(getFiltered());}
function getFiltered(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  return mechanics.filter(m=>{
    const mc=activeChip==='all'||(activeChip==='open'&&m.availability==='open')||(activeChip==='top'&&m.rating>=4.7)||m.services.some(s=>s.toLowerCase().includes(activeChip));
    const mq=!q||m.name.toLowerCase().includes(q)||m.services.some(s=>s.toLowerCase().includes(q));
    return mc&&mq;
  });
}
function filterCards(){renderCards(getFiltered());}
renderCards(mechanics);renderPins();
</script>
</body>
</html>
