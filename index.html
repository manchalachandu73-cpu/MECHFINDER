<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MechFinder</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{
  --bg:#07080a;--surface:#0f1114;--card:#13151a;--raised:#181c22;
  --border:#23272f;--border2:#2e3440;
  --amber:#f59e0b;--amberD:#d97706;--amberL:#fcd34d;
  --green:#10b981;--greenD:#059669;--red:#ef4444;
  --blue:#3b82f6;--blueD:#2563eb;--cyan:#06b6d4;
  --purple:#8b5cf6;--purpleD:#7c3aed;--pink:#ec4899;
  --accent:var(--amber);--accentD:var(--amberD);--accentL:var(--amberL);
  --white:#f1f0ed;--muted:#6b7280;--muted2:#9ca3af;
  --glow-amber:0 0 40px rgba(245,158,11,0.2);
  --glow-green:0 0 40px rgba(16,185,129,0.2);
  --glow-blue:0 0 40px rgba(59,130,246,0.2);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

/* ═══ ANIMATED BACKGROUND ═══ */
body{
  background:var(--bg);color:var(--white);font-family:'Outfit',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:20px;overflow-x:hidden;position:relative;
}
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(245,158,11,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(245,158,11,0.025) 1px,transparent 1px);
  background-size:56px 56px;
  animation:gridDrift 20s linear infinite;
}
@keyframes gridDrift{0%{background-position:0 0}100%{background-position:56px 56px}}
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 55% 45% at 10% 15%,rgba(245,158,11,0.07) 0%,transparent 65%),
    radial-gradient(ellipse 45% 40% at 90% 80%,rgba(59,130,246,0.06) 0%,transparent 65%),
    radial-gradient(ellipse 35% 30% at 80% 20%,rgba(139,92,246,0.05) 0%,transparent 60%),
    radial-gradient(ellipse 30% 35% at 20% 80%,rgba(16,185,129,0.05) 0%,transparent 60%);
}

.app{width:100%;max-width:480px;position:relative;z-index:1;}

/* ═══ LOGO ═══ */
.logo-bar{display:flex;align-items:center;gap:12px;margin-bottom:26px;}
.logo-icon{
  width:42px;height:42px;
  background:linear-gradient(135deg,var(--amber),var(--amberD));
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:20px;
  box-shadow:0 4px 20px rgba(245,158,11,0.5),0 0 0 1px rgba(245,158,11,0.2);
  animation:logoFloat 3s ease-in-out infinite;
}
@keyframes logoFloat{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-3px) rotate(-3deg)}}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;}
.logo-text span{
  background:linear-gradient(90deg,var(--amber),var(--amberL),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  background-size:200% auto;animation:shimmer 3s linear infinite;
}
@keyframes shimmer{0%{background-position:0% center}100%{background-position:200% center}}
.logo-tagline{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}

/* ═══ CARD ═══ */
.card{
  background:linear-gradient(145deg,rgba(19,21,26,0.95),rgba(15,17,20,0.98));
  border:1px solid var(--border);border-radius:22px;
  padding:32px;
  box-shadow:0 32px 80px rgba(0,0,0,0.6),var(--glow-amber);
  animation:popIn 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
  position:relative;overflow:hidden;
  backdrop-filter:blur(8px);
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent 0%,var(--amber) 30%,var(--cyan) 60%,var(--purple) 80%,transparent 100%);
  animation:borderFlow 4s linear infinite;background-size:200% auto;
}
@keyframes borderFlow{0%{background-position:0% center}100%{background-position:200% center}}
.card::after{
  content:'';position:absolute;top:-80px;right:-80px;
  width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,rgba(245,158,11,0.06) 0%,transparent 70%);
  pointer-events:none;
}
@keyframes popIn{from{opacity:0;transform:scale(0.92) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}

.card-title{
  font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:2px;margin-bottom:6px;
  background:linear-gradient(135deg,var(--white) 40%,var(--amberL));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.card-sub{color:var(--muted2);font-size:14px;font-weight:400;margin-bottom:28px;line-height:1.6;}

/* ═══ CHOICE BUTTONS ═══ */
.choice-grid{display:flex;flex-direction:column;gap:10px;}
.choice-btn{
  display:flex;align-items:center;gap:14px;
  background:linear-gradient(135deg,rgba(24,28,34,0.8),rgba(19,21,26,0.9));
  border:1.5px solid var(--border);border-radius:16px;padding:17px 18px;
  cursor:pointer;text-align:left;transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  font-family:'Outfit',sans-serif;position:relative;overflow:hidden;
}
.choice-btn::before{
  content:'';position:absolute;inset:0;opacity:0;transition:opacity 0.3s;
  background:linear-gradient(135deg,rgba(245,158,11,0.06),rgba(6,182,212,0.04));
}
.choice-btn::after{content:'›';position:absolute;right:18px;color:var(--muted);font-size:22px;transition:all 0.25s;}
.choice-btn:hover{border-color:var(--amber);transform:translateX(5px) scale(1.01);box-shadow:0 8px 32px rgba(245,158,11,0.12),-4px 0 0 var(--amber);}
.choice-btn:hover::before{opacity:1;}
.choice-btn:hover::after{color:var(--amber);right:14px;}
.choice-icon{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0;transition:transform 0.25s;}
.choice-btn:hover .choice-icon{transform:scale(1.1) rotate(-5deg);}
.ci-orange{background:linear-gradient(135deg,rgba(245,158,11,0.15),rgba(245,158,11,0.05));border:1px solid rgba(245,158,11,0.25);}
.ci-green{background:linear-gradient(135deg,rgba(16,185,129,0.15),rgba(16,185,129,0.05));border:1px solid rgba(16,185,129,0.25);}
.ci-blue{background:linear-gradient(135deg,rgba(59,130,246,0.15),rgba(59,130,246,0.05));border:1px solid rgba(59,130,246,0.25);}
.ci-purple{background:linear-gradient(135deg,rgba(139,92,246,0.15),rgba(139,92,246,0.05));border:1px solid rgba(139,92,246,0.25);}
.ci-cyan{background:linear-gradient(135deg,rgba(6,182,212,0.15),rgba(6,182,212,0.05));border:1px solid rgba(6,182,212,0.25);}
.ci-pink{background:linear-gradient(135deg,rgba(236,72,153,0.15),rgba(236,72,153,0.05));border:1px solid rgba(236,72,153,0.25);}
.choice-label{font-size:15px;font-weight:700;color:var(--white);}
.choice-desc{font-size:12px;color:var(--muted2);font-weight:400;margin-top:2px;}

/* ═══ FORM ═══ */
.form-group{margin-bottom:16px;}
.form-group label{
  display:block;font-size:11px;font-weight:700;letter-spacing:1.4px;
  text-transform:uppercase;color:var(--muted);margin-bottom:7px;
}
.form-group input,.form-group select{
  width:100%;background:rgba(7,8,10,0.7);
  border:1.5px solid var(--border);border-radius:12px;
  padding:14px 16px;font-family:'Outfit',sans-serif;
  font-size:15px;color:var(--white);outline:none;
  transition:border-color 0.25s,box-shadow 0.25s,background 0.25s;
  appearance:none;
}
.form-group select option{background:var(--card);}
.form-group input:focus,.form-group select:focus{
  border-color:var(--amber);
  box-shadow:0 0 0 3px rgba(245,158,11,0.12),0 0 20px rgba(245,158,11,0.08);
  background:rgba(7,8,10,0.9);
}
.form-group input::placeholder{color:var(--muted);}

/* ═══ BUTTONS ═══ */
.btn{
  width:100%;padding:15px;border:none;border-radius:13px;
  font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;
  cursor:pointer;transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  position:relative;overflow:hidden;
}
.btn::after{
  content:'';position:absolute;inset:0;opacity:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.1),transparent);
  transition:opacity 0.3s;
}
.btn:hover::after{opacity:1;}
.btn-primary{
  background:linear-gradient(135deg,var(--amber) 0%,var(--amberD) 50%,#c2410c 100%);
  color:#000;box-shadow:0 4px 24px rgba(245,158,11,0.4),0 0 0 1px rgba(245,158,11,0.2);
  background-size:200% auto;animation:btnShimmer 3s linear infinite;
}
@keyframes btnShimmer{0%{background-position:0% center}100%{background-position:200% center}}
.btn-primary:hover{transform:translateY(-3px) scale(1.01);box-shadow:0 12px 36px rgba(245,158,11,0.55),0 0 60px rgba(245,158,11,0.2);}
.btn-ghost{background:transparent;border:1.5px solid var(--border2);color:var(--muted2);}
.btn-ghost:hover{border-color:var(--amber);color:var(--white);box-shadow:0 0 20px rgba(245,158,11,0.1);}
.btn+.btn{margin-top:10px;}

/* ═══ PW HINTS ═══ */
.pw-hints{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.pw-hint{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--border);color:var(--muted);background:var(--surface);transition:all 0.25s;}
.pw-hint.ok{background:rgba(16,185,129,0.1);border-color:rgba(16,185,129,0.4);color:var(--green);box-shadow:0 0 8px rgba(16,185,129,0.1);}

/* ═══ ALERTS ═══ */
.alert{padding:12px 16px;border-radius:11px;font-size:13px;font-weight:600;margin-bottom:14px;display:none;align-items:center;gap:8px;}
.alert.error{background:rgba(239,68,68,0.12);color:var(--red);border:1px solid rgba(239,68,68,0.25);display:flex;box-shadow:0 0 20px rgba(239,68,68,0.08);}
.alert.success{background:rgba(16,185,129,0.12);color:var(--green);border:1px solid rgba(16,185,129,0.25);display:flex;box-shadow:0 0 20px rgba(16,185,129,0.08);}

/* ═══ BACK ═══ */
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;cursor:pointer;margin-bottom:20px;transition:color 0.2s;background:none;border:none;font-family:'Outfit',sans-serif;padding:0;}
.back-link:hover{color:var(--amber);}

/* ═══ SERVICES GRID ═══ */
.services-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-height:260px;overflow-y:auto;padding-right:4px;margin-bottom:14px;}
.services-grid::-webkit-scrollbar{width:3px;}
.services-grid::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.service-item{
  display:flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,rgba(15,17,20,0.8),rgba(19,21,26,0.6));
  border:1.5px solid var(--border);border-radius:11px;padding:10px 12px;
  cursor:pointer;transition:all 0.2s;font-size:12px;font-weight:600;user-select:none;
}
.service-item:hover{border-color:var(--amber);transform:scale(1.02);}
.service-item.selected{background:rgba(245,158,11,0.1);border-color:var(--amber);color:var(--amber);box-shadow:0 0 16px rgba(245,158,11,0.1);}
.svc-check{width:16px;height:16px;border:2px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;transition:all 0.2s;}
.service-item.selected .svc-check{background:var(--amber);border-color:var(--amber);color:#000;}
.svc-price{color:var(--muted);font-size:10px;font-weight:400;display:block;margin-top:1px;}

/* ═══ COST BAR ═══ */
.cost-bar{
  background:linear-gradient(135deg,rgba(245,158,11,0.1),rgba(245,158,11,0.04));
  border:1px solid rgba(245,158,11,0.25);border-radius:13px;
  padding:14px 18px;display:none;margin-bottom:14px;
  align-items:center;justify-content:space-between;
  box-shadow:0 0 24px rgba(245,158,11,0.08);
}
.cost-bar.show{display:flex;}
.cost-label{font-size:12px;color:var(--muted2);}
.cost-value{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--amber);letter-spacing:1px;text-shadow:0 0 20px rgba(245,158,11,0.4);}

/* ═══ RESULT ═══ */
.booking-id{font-family:'JetBrains Mono',monospace;font-size:13px;background:var(--surface);border:1px solid var(--border);color:var(--muted2);padding:6px 14px;border-radius:8px;display:inline-block;margin-bottom:18px;}
.result-block{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:18px;margin-bottom:12px;}
.result-block.success-block{border-color:rgba(16,185,129,0.3);background:rgba(16,185,129,0.04);}
.rb-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.chip-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.chip{
  background:linear-gradient(135deg,rgba(245,158,11,0.12),rgba(245,158,11,0.06));
  color:var(--amber);border:1px solid rgba(245,158,11,0.3);
  font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;
}
.amount-display{font-family:'Bebas Neue',sans-serif;font-size:48px;color:var(--amber);letter-spacing:1px;line-height:1;text-shadow:0 0 30px rgba(245,158,11,0.3);}
/* ═══ MECHANIC ROW ═══ */
.mechanic-row{display:flex;align-items:center;gap:14px;padding-top:14px;margin-top:14px;border-top:1px solid var(--border);}
.mech-av{
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--amber),var(--red));
  display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;
  box-shadow:0 4px 20px rgba(245,158,11,0.35);animation:mechFloat 3s ease-in-out infinite;
}
@keyframes mechFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.mech-nm{font-size:16px;font-weight:700;}
.mech-ph{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted2);margin-top:2px;}

/* ═══ STARS ═══ */
.stars-row{display:flex;gap:10px;margin:12px 0;}
.star-btn{font-size:34px;cursor:pointer;opacity:0.15;transition:opacity 0.2s,transform 0.2s,filter 0.2s;background:none;border:none;color:var(--amber);padding:0;}
.star-btn.lit{opacity:1;filter:drop-shadow(0 0 8px rgba(245,158,11,0.6));}
.star-btn:hover{transform:scale(1.3) rotate(-5deg);}
.rating-msg{font-size:14px;color:var(--muted2);min-height:22px;}

/* ═══ PROFILE ═══ */
.profile-hero{
  background:linear-gradient(135deg,rgba(13,15,18,0.95) 0%,rgba(245,158,11,0.06) 100%);
  border:1px solid var(--border);border-radius:22px;padding:28px;
  margin-bottom:16px;position:relative;overflow:hidden;
  animation:popIn 0.45s ease both;
  box-shadow:0 20px 60px rgba(0,0,0,0.5),var(--glow-amber);
}
.profile-hero::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--amber),var(--cyan),transparent);
}
.profile-hero::after{
  content:'';position:absolute;top:-60px;right:-60px;
  width:180px;height:180px;border-radius:50%;
  background:radial-gradient(circle,rgba(245,158,11,0.1) 0%,transparent 70%);
  pointer-events:none;
}
.profile-top{display:flex;align-items:flex-start;gap:16px;margin-bottom:20px;}
.profile-avatar{
  width:76px;height:76px;border-radius:50%;
  background:linear-gradient(135deg,var(--amber),var(--red),var(--purple));
  display:flex;align-items:center;justify-content:center;
  font-size:32px;flex-shrink:0;
  box-shadow:0 8px 30px rgba(245,158,11,0.45),0 0 0 3px rgba(245,158,11,0.15);
  border:3px solid rgba(245,158,11,0.3);position:relative;
  animation:avatarPulse 4s ease-in-out infinite;
}
@keyframes avatarPulse{0%,100%{box-shadow:0 8px 30px rgba(245,158,11,0.45),0 0 0 3px rgba(245,158,11,0.15)}50%{box-shadow:0 8px 40px rgba(245,158,11,0.65),0 0 0 6px rgba(245,158,11,0.08)}}
.online-dot{position:absolute;bottom:2px;right:2px;width:14px;height:14px;background:var(--green);border-radius:50%;border:2px solid var(--card);animation:pulse 2s infinite;box-shadow:0 0 8px rgba(16,185,129,0.6);}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,0.6)}50%{box-shadow:0 0 0 8px rgba(16,185,129,0)}}
.profile-name{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:1px;line-height:1;
  background:linear-gradient(135deg,var(--white),var(--amberL));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.profile-role{font-size:13px;color:var(--amber);font-weight:600;margin:4px 0;}
.profile-location{font-size:13px;color:var(--muted2);display:flex;align-items:center;gap:4px;}
.profile-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:var(--green);font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;margin-top:8px;box-shadow:0 0 12px rgba(16,185,129,0.1);}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px;}
.stat-box{background:var(--card);padding:14px 8px;text-align:center;transition:background 0.2s;}
.stat-box:hover{background:rgba(245,158,11,0.05);}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--amber);letter-spacing:0.5px;text-shadow:0 0 20px rgba(245,158,11,0.3);}
.stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-top:2px;}

.profile-actions{display:flex;gap:10px;margin-bottom:16px;}
.act-btn{flex:1;padding:12px;border-radius:11px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.25s;border:none;display:flex;align-items:center;justify-content:center;gap:6px;}
.act-primary{background:linear-gradient(135deg,var(--amber),var(--amberD));color:#000;box-shadow:0 4px 18px rgba(245,158,11,0.35);}
.act-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(245,158,11,0.5);}
.act-secondary{background:var(--raised);color:var(--white);border:1.5px solid var(--border);}
.act-secondary:hover{border-color:var(--cyan);color:var(--cyan);}

.section-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}

.skills-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;}
.skill-pill{background:var(--raised);border:1.5px solid var(--border);color:var(--muted2);font-size:12px;font-weight:600;padding:6px 14px;border-radius:8px;transition:all 0.2s;cursor:default;}
.skill-pill:hover{border-color:var(--amber);color:var(--amber);box-shadow:0 0 12px rgba(245,158,11,0.1);}
.skill-pill.highlight{background:rgba(245,158,11,0.08);border-color:rgba(245,158,11,0.3);color:var(--amber);}

.info-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);}
.info-row:last-child{border-bottom:none;}
.info-key{font-size:13px;color:var(--muted2);display:flex;align-items:center;gap:8px;}
.info-val{font-size:13px;font-weight:600;}
.info-val.mono{font-family:'JetBrains Mono',monospace;font-size:12px;}

.booking-item{
  background:linear-gradient(135deg,rgba(13,15,18,0.8),rgba(24,28,34,0.5));
  border:1px solid var(--border);border-radius:11px;padding:12px 14px;
  display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;
  transition:all 0.2s;
}
.booking-item:hover{border-color:var(--amber);transform:translateX(3px);box-shadow:0 4px 16px rgba(245,158,11,0.08);}
.bi-left{display:flex;align-items:center;gap:10px;}

        <rect x="8" y="8" width="122" height="24" rx="7" fill="rgba(16,185,129,0.14)" stroke="rgba(16,185,129,0.35)" stroke-width="1"/>
        <text x="17" y="24" fill="#10b981" font-size="10" font-family="Outfit,sans-serif" font-weight="700">✅ Live &amp; Discoverable</text>

        <!-- Distance rings label -->
        <text x="${pin.x+42}" y="${pin.y-46}" fill="rgba(245,158,11,0.5)" font-size="7" font-family="Outfit,sans-serif">~5 km radius</text>
      </svg>
    </div>
    <div class="map-legend" style="margin-top:10px;">
      <div class="map-leg-item"><div class="map-leg-dot" style="background:#f59e0b;box-shadow:0 0 6px rgba(245,158,11,0.5);"></div>Your Location</div>
      <div class="map-leg-item"><div class="map-leg-dot" style="background:rgba(245,158,11,0.15);border:1px dashed #f59e0b;"></div>Coverage Area</div>
      <div class="map-leg-item"><div class="map-leg-dot" style="background:#3b82f6;"></div>Other Mechanics</div>
    </div>
  </div>

  <!-- ═══ CTA ═══ -->
  <div class="cta-row">
    <button class="cta-btn cta-share" onclick="alert('Share feature coming soon! 🚀')">🔗 Share Profile</button>
    <button class="cta-btn cta-copy" onclick="navigator.clipboard&&navigator.clipboard.writeText('${regId}');this.textContent='✓ Copied!'">📋 Copy ID</button>
  </div>
  <button class="btn btn-primary" onclick="go('home')">🏠 Go to Home →</button>
</div>`;
}
};

// LOGIC

  if(val !== 'mangalagiri'){ panel.innerHTML=''; return; }
  panel.innerHTML=`
    <div style="margin-bottom:14px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
        <span style="font-size:16px;">🛣️</span>
        <span style="font-size:12px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--amber);">National Highway Mechanics — Mangalagiri</span>
      </div>
      ${MECHANICS_NH_MANGALAGIRI.map(m=>`
        <div style="background:linear-gradient(135deg,rgba(245,158,11,0.07),rgba(245,158,11,0.02));border:1.5px solid rgba(245,158,11,0.25);border-radius:13px;padding:13px 15px;margin-bottom:8px;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;">
            <div>
              <div style="font-size:14px;font-weight:700;color:var(--white);margin-bottom:3px;">${m.name}</div>

              <div style="font-size:10px;color:var(--amber);font-weight:600;">${m.tag}</div>
            </div>
            <div style="text-align:right;flex-shrink:0;margin-left:10px;">
              <div style="font-size:13px;font-weight:700;color:var(--green);">⭐ ${m.rating}</div>
              <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted2);margin-top:4px;">📞 ${m.phone}</div>

function updateHints(){
  const pw=document.getElementById('up')?.value||'';
  const c=checkPw(pw);
  document.getElementById('h1')?.classList.toggle('ok',c.len);
  document.getElementById('h2')?.classList.toggle('ok',c.upper);
  document.getElementById('h3')?.classList.toggle('ok',c.lower);
  document.getElementById('h4')?.classList.toggle('ok',c.digit);
}
function doUserLogin(){
  const n=document.getElementById('un').value.trim();
  const pw=document.getElementById('up').value;
  const c=checkPw(pw);
  if(!n){showAlert('al','Please enter your name.','error');return;}
  if(!(c.len&&c.lower&&c.upper&&c.digit)){showAlert('al','Password does not meet requirements.','error');return;}
  go('search_mode',{userName:n});
}
function doMechLogin(){
  const u=document.getElementById('mu').value.trim().toLowerCase();
  const p=parseInt(document.getElementById('mp').value);
  const profile=REGISTERED_USERS[u];
  if(profile&&profile.pass===p){go('mech_profile',{mechProfile:profile});}
  else{showAlert('al','Invalid username or password.','error');}
}
function toggleSvc(el,svc,cost){
  if(selectedServices[svc]){delete selectedServices[svc];el.classList.remove('selected');}
  else{selectedServices[svc]=cost;el.classList.add('selected');}
  const total=Object.values(selectedServices).reduce((a,b)=>a+b,0);
  const cb=document.getElementById('cb'),ct=document.getElementById('ct');
  if(cb)cb.classList.toggle('show',total>0);
  if(ct)ct.textContent='₹'+total;
}
function toAddr(){
  if(!Object.keys(selectedServices).length){showAlert('al','Select at least one service.','error');return;}
  state.data.selectedServices=Object.keys(selectedServices);
  state.data.totalCost=Object.values(selectedServices).reduce((a,b)=>a+b,0);
  selectedServices={};
  go('pick_address');
}
function doBook(){
  const addr=document.getElementById('as').value;
  if(!addr){showAlert('al','Please select your location.','error');return;}
  const vt=state.data.vehicleType;
  const db=(vt==='bike'||vt==='scooty'||vt==='car')?MECHANICS_BIKE:MECHANICS_OTHER;
  const m=db[addr];
  if(!m){showAlert('al','No mechanic available in that area.','error');return;}
  go('booking_result',{mechanic:m,bookingId:genId()});
}
function doDirect(){
  const addr=document.getElementById('as').value;
  if(!addr){showAlert('al','Please select your location.','error');return;}
  const m=MECHANICS_OTHER[addr];
  if(!m){showAlert('al','No mechanic in that area.','error');return;}
  go('direct_result',{mechanic:m,bookingId:genId()});
}
function doCheckPhone(){
  const n=document.getElementById('nn').value.trim();
  const a=document.getElementById('na').value.trim();
  const p=document.getElementById('np').value.trim();
  if(!n||!a){showAlert('al','Fill all fields.','error');return;}
  if(p.length!==10||isNaN(p)){showAlert('al','Enter a valid 10-digit phone number.','error');return;}
  go('mechanic_type',{newName:n,newAddr:a,newPhone:p});
}
function doShopReg(){
  const a=document.getElementById('sa').value.trim();
  const l=document.getElementById('sl').value.trim();
  if(!a||!l){showAlert('al','Fill all fields.','error');return;}
  if(l.length!==16){showAlert('al','License must be exactly 16 characters.','error');return;}
  if(!/^\d+$/.test(l.slice(6))){showAlert('al','Last 10 characters must be digits.','error');return;}
  go('reg_success',{regDetails:{Name:state.data.newName,Location:state.data.newAddr,Phone:state.data.newPhone,'Shop Address':a,License:l,Type:'Shop Owner'}});
}
function doCompanyReg(){
  const a=document.getElementById('ca').value.trim();
  const i=document.getElementById('ci').value.trim();
  const p=document.getElementById('cp').value.trim();
  if(!a||!i){showAlert('al','Fill all fields.','error');return;}
  if(p.length!==10||isNaN(p)){showAlert('al','Valid 10-digit secondary phone required.','error');return;}
  go('reg_success',{regDetails:{Name:state.data.newName,Location:state.data.newAddr,Phone:state.data.newPhone,'Company Address':a,'Company ID':i,'Secondary Phone':p,Type:'Company Agent'}});
}
function doFreelancerReg(){
  const s=document.getElementById('fs').value.trim();
  const a=document.getElementById('fa').value.trim();
  if(!s||!a){showAlert('al','Fill all fields.','error');return;}
  go('reg_success',{regDetails:{Name:state.data.newName,Location:state.data.newAddr,Phone:state.data.newPhone,Service:s,Rate:'₹'+a,Type:'Freelance Mechanic'}});
}
function setRating(v){
  currentRating=v;
  document.querySelectorAll('.star-btn').forEach(b=>b.classList.toggle('lit',+b.dataset.v<=v));
  const msgs=['','Needs work 😕','Could be better 🙂','Good! 👍','Great app! 😊','Absolutely love it! 🔥'];
  const el=document.getElementById('rmsg');if(el)el.textContent=msgs[v]||'';
}
function submitRating(){
  if(!currentRating){showAlert('al','Please give a rating.','error');return;}
  showAlert('al',`Thanks for rating us ${currentRating}/5! 🎉`,'success');
  setTimeout(()=>go('home'),1600);
}

function spawnConfetti(){
  const wrap=document.getElementById('conf-wrap');
  if(!wrap)return;
  const colors=['#f59e0b','#10b981','#3b82f6','#8b5cf6','#ec4899','#06b6d4','#ef4444','#fcd34d'];
  for(let i=0;i<60;i++){
    const p=document.createElement('div');
    p.className='confetti-p';
    const size=(Math.random()*8+4)+'px';
    p.style.cssText=`left:${Math.random()*100}%;width:${size};height:${size};background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${Math.random()*2+1.5}s;animation-delay:${Math.random()*0.8}s;border-radius:${Math.random()>0.5?'50%':'2px'};opacity:${0.6+Math.random()*0.4};`;
    wrap.appendChild(p);
  }
  setTimeout(()=>wrap&&wrap.parentNode&&wrap.parentNode.removeChild(wrap),4000);
}

(function(){
  const canvas=document.getElementById('bg-canvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  let W,H;
  const particles=[];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  for(let i=0;i<55;i++){
    particles.push({
      x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,
      r:Math.random()*2+0.5,
      vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,
      color:['rgba(245,158,11,','rgba(16,185,129,','rgba(59,130,246,','rgba(139,92,246,','rgba(6,182,212,'][Math.floor(Math.random()*5)],
      a:Math.random()*0.22+0.05
    });
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    particles.forEach(p=>{
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.color+p.a+')';ctx.fill();
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;
      if(p.y<0)p.y=H;if(p.y>H)p.y=0;
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

render();
</script>
